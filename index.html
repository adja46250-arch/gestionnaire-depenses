<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MonBudget</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- PAGE CONNEXION -->
  <div id="auth-page">
    <div class="auth-box">
      <div class="auth-logo">💸</div>
      <h1>MonBudget</h1>
      <p class="auth-subtitle">Gérez vos finances simplement</p>

      <div class="tabs">
        <button class="tab active" id="tab-login" onclick="showTab('login')">Connexion</button>
        <button class="tab" id="tab-register" onclick="showTab('register')">Inscription</button>
      </div>

      <!-- CONNEXION -->
      <div id="login-form">
        <input type="email" id="login-email" placeholder="Adresse email"/>
        <input type="password" id="login-password" placeholder="Mot de passe"/>
        <button class="btn-primary" onclick="login()">Se connecter</button>
      </div>

      <!-- INSCRIPTION -->
      <div id="register-form" style="display:none">
        <div class="input-row">
          <input type="text" id="reg-prenom" placeholder="Prénom"/>
          <input type="text" id="reg-nom" placeholder="Nom"/>
        </div>
        <input type="email" id="reg-email" placeholder="Adresse email"/>
        <input type="password" id="reg-password" placeholder="Mot de passe (min. 6 caractères)"/>
        <button class="btn-primary" onclick="register()">Créer mon compte</button>
      </div>

      <p id="auth-msg" class="msg"></p>
    </div>
  </div>

  <!-- PAGE PRINCIPALE -->
  <div id="main-page" style="display:none">

    <!-- HEADER -->
    <header>
      <div class="user-info">
        <div class="avatar" id="user-avatar">?</div>
        <div>
          <div class="user-name" id="user-name">...</div>
          <div class="user-hello">Bonjour 👋</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">Déconnexion</button>
    </header>

    <div class="container">

      <!-- SOLDE -->
      <div class="solde-card">
        <div class="solde-label">Solde actuel</div>
        <div class="solde-amount" id="solde">0 FCFA</div>
        <div class="solde-mois" id="solde-mois"></div>
      </div>

      <!-- STATS -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon green-bg">💰</div>
          <div class="stat-label">Revenus</div>
          <div class="stat-val green" id="total-revenus">0 FCFA</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon red-bg">💸</div>
          <div class="stat-label">Dépenses</div>
          <div class="stat-val red" id="total-depenses">0 FCFA</div>
        </div>
      </div>

      <!-- FORMULAIRE -->
      <div class="card">
        <h3>➕ Nouvelle transaction</h3>

        <div class="input-row">
          <input type="text" id="titre" placeholder="Description (ex: Salaire)"/>
          <input type="number" id="montant" placeholder="Montant (FCFA)"/>
        </div>

        <div class="type-toggle">
          <button class="type-btn active-green" id="btn-revenu" onclick="setType('revenu')">💰 Revenu</button>
          <button class="type-btn" id="btn-depense" onclick="setType('depense')">💸 Dépense</button>
        </div>

        <select id="categorie">
          <option value="Salaire">💼 Salaire</option>
          <option value="Alimentation">🍽️ Alimentation</option>
          <option value="Transport">🚗 Transport</option>
          <option value="Loisirs">🎉 Loisirs</option>
          <option value="Santé">🏥 Santé</option>
          <option value="Logement">🏠 Logement</option>
          <option value="Autre">📦 Autre</option>
        </select>

        <button class="btn-primary" onclick="ajouterTransaction()">Ajouter la transaction</button>
        <p id="form-msg" class="msg"></p>
      </div>

      <!-- HISTORIQUE -->
      <div class="card">
        <h3>📋 Historique des transactions</h3>
        <div id="liste"></div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
